apiVersion: v1
kind: Pod
metadata:
  name: debug-pod
  namespace: feature-readonlyroot
  ownerReferences:
  - apiVersion: v1
    kind: Pod
    name: sdp-daas-api-5974fb4d4f-56xgg
    uid: $(kubectl get pod sdp-daas-api-5974fb4d4f-56xgg -n feature-readonlyroot -o jsonpath='{.metadata.uid}')
    blockOwnerDeletion: true
spec:
  shareProcessNamespace: true
  containers:
  - name: debugger
    image: mcr.microsoft.com/dotnet/sdk:8.0
    command: ["/bin/sh"]
    args:
      - -c
      - >
        apt-get update && 
        apt-get install -y procps curl bash && 
        echo "Debug pod ready. Run: bash" && 
        sleep infinity
    securityContext:
      runAsUser: 0
      runAsGroup: 0
      capabilities:
        add: ["SYS_PTRACE"]  # Required for vsdbg attach
    volumeMounts:
      - name: app-dir
        mountPath: /app
  volumes:
    - name: app-dir
      emptyDir: {}
  restartPolicy: Never
